name: validate
# Reproducible edge validation: pull daily bars -> backtest -> deflation gate.
# Add a repo secret RH_TOKEN (Robinhood bearer token) for the data pull to work.
on:
  workflow_dispatch:        # run on demand
  schedule:
    - cron: "0 23 * * 6"    # weekly, Saturday 23:00 UTC

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pull daily bars into data/
        env:
          RH_TOKEN: ${{ secrets.RH_TOKEN }}
        run: python market_data.py
      - name: Run deflation gate
        run: python run_validation.py
      - name: Commit refreshed data + results
        run: |
          git config user.name "quant-bot"
          git config user.email "quant-bot@users.noreply.github.com"
          git add data validation_results.json 2>/dev/null || true
          git commit -m "automated: refresh data + validation results" || echo "no changes"
          git push || echo "push skipped"
